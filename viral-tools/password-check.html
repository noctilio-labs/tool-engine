<!DOCTYPE html>
<html>
<head>
<title>Password Strength Checker</title>
<meta name="description" content="Check password strength instantly.">
</head>
<body>
<h2>Password Strength</h2>

<input id="p" type="password">
<button onclick="calc()">Check</button>

<h3 id="out"></h3>

<script>
function calc(){
let s=p.value.length;
let r = s>10?"Strong":s>6?"Medium":"Weak";
document.getElementById('out').innerText=r;
}
</script>
</body>
</html>
